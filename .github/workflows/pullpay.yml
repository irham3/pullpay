name: PullPay
on:
  pull_request:
    types: [closed]
jobs:
  settle:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Notify PullPay relayer
        run: |
          curl -X POST "https://pullpay-sigma.vercel.app/api/settle" \
            -H 'Content-Type: application/json' \
            -d '{
              "rewardId": "0xd49417a20d79e7c83680cc86c06b8bfc91e3c1f3eda0f0e601565abd766ca7bd",
              "repo": "irham3/pullpay",
              "pr": ${{ github.event.pull_request.number }},
              "issue": 5,
              "author": "${{ github.event.pull_request.user.login }}"
            }'